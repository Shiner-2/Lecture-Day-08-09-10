# Data contract - Lab Day 10

version: "1.0"
dataset: "kb_chunk_export"
owner_team: "Day10 data pipeline group"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "Stable cleaned chunk identifier generated from doc_id, text, and sequence."
  doc_id:
    type: string
    required: true
    description: "Canonical source document id."
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
    constraints:
      format: "YYYY-MM-DD"
  exported_at:
    type: datetime
    required: true
    constraints:
      format: "ISO-8601"

quality_rules:
  - id: "unknown_doc_id"
    description: "Quarantine rows not mapped to the five canonical Day 10 documents."
    severity: "halt"
  - id: "duplicate_chunk_text"
    description: "Keep the first normalized chunk text and quarantine later duplicates."
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "policy_refund_v4 must not publish the stale 14-day refund window."
    severity: "halt"
  - id: "stale_hr_policy_text"
    description: "hr_leave_policy must not publish HR 2025 annual-leave text that says 10 annual leave days."
    severity: "halt"
  - id: "required_grading_doc_coverage"
    description: "The cleaned snapshot must include every doc_id required by grading."
    severity: "halt"
  - id: "exported_at_iso_datetime"
    description: "Published rows must have parseable ISO exported_at timestamps."
    severity: "halt"

freshness:
  measured_at: "publish"
  sla_hours: 24
  alert_channel: "#data-quality"
  current_sample_status: "FAIL because latest_exported_at is 2026-04-11T00:00:00 and the final run was on 2026-06-10."

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
    owner: "CS"
    freshness_metric: "latest_exported_at"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
    owner: "IT Support"
    freshness_metric: "latest_exported_at"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
    owner: "IT Helpdesk"
    freshness_metric: "latest_exported_at"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
    owner: "HR"
    freshness_metric: "effective_date and latest_exported_at"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"
    owner: "IT Security"
    freshness_metric: "effective_date and latest_exported_at"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
  refund_policy_current_window: "7 business days"
